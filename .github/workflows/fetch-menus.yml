name: Fetch Daily Menus

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 8:00 UTC Mon-Fri (10:00 CEST / 9:00 CET)
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Post to test channel instead of production'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Fetch menus
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python fetch_menus.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add menus/
          git diff --staged --quiet || git commit -m "Update menus $(date +%Y-%m-%d)"
          git push

      - name: Post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python post_menus.py
